<script type="module">
  import * as cases from "./cases/index.js";

  // Tool
  const tool = document.createElement("div");
  tool.id = "tool";
  tool.style.display = "flex";
  tool.style.margin = "1em 0px";
  document.body.append(tool);

  // Select
  const select = createSelect(() => {
    const {value} = select;
    history.pushState({value}, "", `?name=${value}`);
    render();
  });
  const options = Object.keys(cases).map(createOption);
  tool.append(select);
  select.append(...options);

  const container = document.createElement("div");
  container.id = "container";
  document.body.append(container);

  // Init app name.
  const initialValue = new URL(location).searchParams.get("name");
  if (cases[initialValue]) select.value = initialValue;
  render();

  function createSelect(onchange) {
    const select = document.createElement("select");
    select.style.height = "20px";
    select.onchange = onchange;
    document.onkeydown = (event) => {
      if (event.metaKey || event.ctrlKey || event.altKey || event.shiftKey) {
        return;
      }
      switch (event.key) {
        case "ArrowLeft": {
          if (select.selectedIndex > 0) {
            select.selectedIndex--;
            select.onchange();
          } else alert("This is the first test case.");
          break;
        }
        case "ArrowRight": {
          if (select.selectedIndex < select.options.length - 1) {
            select.selectedIndex++;
            select.onchange();
          } else alert("This is the last test case.");
          break;
        }
      }
    };

    return select;
  }

  function createOption(key) {
    const option = document.createElement("option");
    option.value = key;
    option.textContent = key;
    return option;
  }

  function render() {
    container.innerHTML = "";
    const fn = cases[select.value];
    const node = fn();
    container.append(node);
  }
</script>
